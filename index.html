<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free AI Image Generator</title>

<style>

body{
background:#0f0f0f;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

h1{
font-size:35px;
margin-bottom:20px;
}

input{
width:85%;
max-width:500px;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
outline:none;
}

button{
margin-top:15px;
padding:14px 30px;
border:none;
border-radius:12px;
font-size:18px;
background:#00ff99;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

img{
margin-top:25px;
width:90%;
max-width:550px;
border-radius:18px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<h1>AI Image Generator</h1>

<input
type="text"
id="prompt"
placeholder="Enter your image prompt"
/>

<br>

<button onclick="generateImage()">
Generate Image
</button>

<br>

<img id="image"/>

<script>

function generateImage(){

const prompt =
document.getElementById("prompt").value;

const imageUrl =
"https://image.pollinations.ai/prompt/" +
encodeURIComponent(prompt);

document.getElementById("image").src =
imageUrl;

}

</script>

</body>
</html>
